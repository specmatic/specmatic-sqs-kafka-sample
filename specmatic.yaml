version: 3
systemUnderTest:
  service:
    $ref: "#/components/services/sqsKafkaService"
    runOptions:
      $ref: "#/components/runOptions/sqsKafkaServiceTest"
components:
  sources:
    localSpecs:
      filesystem:
        directory: spec
  services:
    sqsKafkaService:
      definitions:
        - definition:
            source:
              $ref: "#/components/sources/localSpecs"
            specs:
              - order-service-sqs-kafka.yaml
  runOptions:
    sqsKafkaServiceTest:
      asyncapi:
        type: test
        servers:
          - host: http://localhost:4566/000000000000
            protocol: sqs
            adminCredentials:
              region: us-east-1
              aws.access.key.id: test
              aws.secret.access.key: test
          - host: localhost:9092
            protocol: kafka